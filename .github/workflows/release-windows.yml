name: Release (Windows)

# Builds the Clumo Windows installer and publishes it to a GitHub Release so the
# "Download for Windows" button (releases/latest/download/Clumo-Setup.exe) works.
#
# How to cut a release:
#   1. Bump the version in package.json / electron/package.json / web/package.json.
#   2. Commit, then push a matching tag, e.g.:
#        git tag v1.1.0 && git push origin v1.1.0
#   3. This workflow builds Clumo-Setup.exe on a Windows runner and publishes it
#      to the GitHub Release for that tag.
#
# You can also trigger it manually from the Actions tab (workflow_dispatch) to test
# a build without publishing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish the build to a GitHub Release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Align version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "Setting workspace versions to $version"
          npm version $version --no-git-tag-version --allow-same-version
          npm version $version --no-git-tag-version --allow-same-version --workspace server
          npm version $version --no-git-tag-version --allow-same-version --workspace web
          npm version $version --no-git-tag-version --allow-same-version --workspace electron

      - name: Build web frontend
        run: npm run build:web

      - name: Build and publish Windows installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $publish = if ("${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish }}" -eq "true") { "always" } else { "never" }
          Write-Host "electron-builder publish mode: $publish"
          npm run build --workspace electron -- --win --publish $publish

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: clumo-windows-installer
          path: |
            dist/Clumo-Setup.exe
            dist/*.exe
          if-no-files-found: warn
